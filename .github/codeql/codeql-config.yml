# CodeQL configuration file
# This file is used to customize the CodeQL analysis, including excluding specific queries.

name: "OpenGNAR Custom CodeQL Config"

query-filters:
  - exclude:
      id: py/path-injection
      # This query frequently flags our internal path resolution logic as "uncontrolled" 
      # because it cannot verify our deep startswith() + realpath() guards.
      # We have manually verified the integrity of backend/system_utils.py.
