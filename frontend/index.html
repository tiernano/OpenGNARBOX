<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenGNAR Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <div class="bg-gradient bg-gradient-1"></div>
    <div class="bg-gradient bg-gradient-2"></div>

    <header class="glass sticky-header flex-between">
        <div class="flex-center gap-3">
            <div class="logo-box">G</div>
            <h1 class="header-title">OpenGNAR Core</h1>
        </div>
        <div class="status-pill flex-center gap-2">
            <div class="status-dot" id="connection-dot"></div>
            <span class="status-text" id="connection-status">Connected</span>
        </div>
    </header>

    <main class="main-container flex-col gap-6">
        
        <!-- Action Hero Section -->
        <section class="glass card text-center p-8 hero-section">
            <h2 class="hero-title">1-Click Backup</h2>
            <p class="hero-subtitle">Securely mirror all data from the SD card to the internal NVMe storage.</p>
            
            <button id="backup-btn" class="primary-btn flex-center gap-2">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                <span>Start Backup</span>
            </button>
            
            <!-- Progress Container -->
            <div id="progress-container" class="progress-wrapper hidden">
                <div class="flex-between progress-text">
                    <span id="backup-status-text" class="status-active">Copying files...</span>
                    <span id="backup-percentage" class="text-white">0%</span>
                </div>
                <div class="progress-track">
                    <div id="backup-progress-bar" class="progress-fill active-gradient w-0"></div>
                </div>
            </div>
        </section>
        
        <!-- System Status Grid -->
        <div class="grid-3 gap-6">
            
            <!-- SD Card Stats -->
            <div class="glass card v-stack hover-up">
                <div class="flex-between mb-6">
                    <div class="flex-center gap-2">
                        <div class="icon-box emerald-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="20" x="5" y="2" rx="2"/><path d="M5 8h14"/><path d="M9 16h6"/></svg>
                        </div>
                        <h3 class="card-title">SD Card</h3>
                    </div>
                    <span id="sd-status-badge" class="badge">Checking...</span>
                </div>
                
                <div class="card-bottom">
                    <div class="flex-between items-end mb-2">
                        <span class="stat-value" id="sd-used">--</span>
                        <span class="stat-total">/ <span id="sd-total">--</span> GB</span>
                    </div>
                    <div class="progress-track">
                        <div id="sd-bar" class="progress-fill bg-emerald w-0"></div>
                    </div>
                </div>
            </div>
            
            <!-- NVMe Stats -->
            <div class="glass card v-stack hover-up">
                <div class="flex-between mb-6">
                    <div class="flex-center gap-2">
                        <div class="icon-box indigo-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M9 21v-9"/><path d="M15 21v-9"/></svg>
                        </div>
                        <h3 class="card-title">NVMe SSD</h3>
                    </div>
                    <span id="nvme-status-badge" class="badge">Checking...</span>
                </div>
                
                <div class="card-bottom">
                    <div class="flex-between items-end mb-2">
                        <span class="stat-value" id="nvme-used">--</span>
                        <span class="stat-total">/ <span id="nvme-total">--</span> GB</span>
                    </div>
                    <div class="progress-track">
                        <div id="nvme-bar" class="progress-fill bg-indigo w-0"></div>
                    </div>
                </div>
            </div>
            
            <!-- Battery Stats -->
            <div class="glass card v-stack hover-up">
                <div class="flex-between mb-6">
                    <div class="flex-center gap-2">
                        <div class="icon-box amber-icon" id="battery-icon-container">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="16" height="10" x="2" y="7" rx="2" ry="2"/><line x1="22" x2="22" y1="11" y2="13"/></svg>
                        </div>
                        <h3 class="card-title">Battery</h3>
                    </div>
                </div>
                
                <div class="card-bottom">
                    <div class="flex-baseline gap-1">
                        <span class="stat-value-lg" id="battery-level">--</span>
                        <span class="stat-symbol">%</span>
                    </div>
                    <p class="stat-desc mt-1" id="battery-status-text">Status unknown</p>
                </div>
            </div>
            
        </div>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
